before_vram = 0x8004FF90
text = "lambo_ws_pin_reset(rdram);"

[[patches.hook]]
func = "func_80050860"
before_vram = 0x8004FFA0
text = "lambo_ws_pin_left(rdram);"

[[patches.hook]]
func = "func_80050860"
before_vram = 0x8004FFA8
text = "lambo_ws_pin_reset(rdram);"

