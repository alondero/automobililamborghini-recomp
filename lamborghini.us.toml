# Issue #3 — widescreen skybox is handled in the renderer (RT64), NOT here. The earlier
# ROM-side hook that widened func_8004384C's frustum aspect was removed: it only runs when
# the game's frame loop runs, so it left the sky wrong whenever that loop is frozen (e.g.
# paused), and it double-widened at-infinity backgrounds on top of RT64's own aspect adjust.
# The renderer now stretches any zero-view-translation (parallax-free) perspective backdrop
# to fill the frame every presented frame. See patches/0008-rt64-skybox-stretch-parallaxless-backdrop.patch.

# Issue #12 — developer warp menu. Per-frame warp tick at the entry of the TOP-LEVEL
# state dispatcher func_800028D0 (runtime 0x80001CD0, argument-free, jump-table over
# states 1..0x10, runs every frame in every state; func_800030F8 was tried first but
# only runs in states 7/8 — too late for menu/attract warps). Consumes an F1-F6 /
# LAMBO_WARP request and performs the menu's own race-launch stores (cursor cluster +
# audio quiesce + state 7) before the dispatcher reads the state word; native in
# src/lambo_warp.c.
[[patches.hook]]
func = "func_800028D0"
before_vram = 0x80001CD0
text = "extern void lambo_warp_tick(uint8_t*, recomp_context*); lambo_warp_tick(rdram, ctx);"

# Issue #22 — developer save-state. Same top-level dispatcher (runs every frame in every
# state), one instruction past the warp hook: N64Recomp rejects two hooks on the exact same
# vram, and 0x80001CD4 is still the frame-boundary entry. Snapshots/restores rdram[0..8MiB)
# on an F5/F9 or LAMBO_STATE_LOAD request; native in src/lambo_savestate.c.
[[patches.hook]]
func = "func_800028D0"
before_vram = 0x80001CD4
text = "extern void lambo_savestate_tick(uint8_t*, recomp_context*); lambo_savestate_tick(rdram, ctx);"

# Issue #40 — widescreen lens flare. The sun flare emitter func_80036854 draws a chain of
# 10 translucent "ghost" texrects. Under ar_option Expand RT64 squishes each small untagged
# texrect into the central 4:3 band (invRatioScale = 1/aspectRatioScale) and collapses its
# scissor the same way, so the flare is cropped instead of tracking the FOV-widened sun.
# Bracket the ghost loop with gEXSetRectAspect(STRETCH) -> invRatioScale = 1.0, which keeps
# the offset-from-centre in game pixels (matching the widened 3D sun) and widens the scissor
# to the full frame. 0x800361BC is just before the loop (after the flare's setup commands);
# 0x80036A60 is just past the loop back-edge (0x80036A58). Natives in
# src/lambo_flare_widescreen.c; no-op at 4:3. See docs/HUD.md.
[[patches.hook]]
func = "func_80036854"
before_vram = 0x800361BC
text = "lambo_flare_ws_aspect_stretch(rdram);"

[[patches.hook]]
func = "func_80036854"
before_vram = 0x80036A60
text = "lambo_flare_ws_aspect_reset(rdram);"

# Issue #42 follow-up — widescreen 3P/4P split screen. The race renderer func_800030F8
# sets up each player's 3D view as a 2x2 quadrant viewport (six perspective viewports per
# frame: four half-width quadrants + full-width sky/minimap). Each quadrant covers only half
# the framebuffer width, so under ar_option Expand RT64 squeezes it to the 4:3 centre and the
# composite is pillarboxed (dark side bars). Setting gEXSetViewportAlign(G_EX_ORIGIN_WIDE)
# makes RT64 render a tagged quadrant wide -- filling its output quarter with a Hor+-widened
# FOV (patches/0008); it is a no-op on the already-full-width viewports. The origin is sticky
# global RSP state, so WIDE is set once before the scene's DL calls (0x800044DC, the cursor
# alloc for the first gSPDisplayList of the tail) and reset at the entry of the 2D HUD
# dispatcher func_80050860 (0x8004FC60) -- which func_800030F8 calls after emitting the whole
# 3D scene -- so it spans every quadrant viewport but never reaches the HUD's 2D/ortho draws.
# The natives self-gate on the player count (0x800CE6A4 >= 3): 1P (full screen) and 2P
# (top/bottom, already full width) never set WIDE. Natives in src/lambo_hud_widescreen.c;
# no-op at 4:3. See docs/HUD.md.
[[patches.hook]]
func = "func_800030F8"
before_vram = 0x800044DC
text = "lambo_ws_split_wide_begin(rdram);"

[[patches.hook]]
func = "func_80050860"
before_vram = 0x8004FC60
text = "lambo_ws_split_wide_end(rdram);"

# Issue #84 — 3P/4P split screen skips the sky panorama (the horizon band above the fog is
# the frame-clear fill colour, authored = the near-black variant-2 fog colour). The frame
# dispatcher func_800030F8 selects environment variant 2 for players >= 3 and guards the
# per-viewport sky-emitter call (jal 0x8000F6D8 at 0x80004E9C) with `slti $at, players, 0x3`
# (0x80004E90) + `beq $at, $zero` (0x80004E94). Routing $at through the native lets the
# game's own emitter run for 3P/4P exactly as it does for 1P/2P (it builds its matrices from
# the per-viewport camera angles at 0x800A2EC0/0x800A2EE8, so it is viewport-correct).
# Native in src/lambo_sky_widescreen.cpp; graphics.json key "widescreen_sky_match".
[[patches.hook]]
func = "func_800030F8"
before_vram = 0x80004E94
text = "{ extern uint32_t lambo_sky_match_1p_guard(uint8_t*, uint32_t); ctx->r1 = lambo_sky_match_1p_guard(rdram, (uint32_t)ctx->r1); }"

# Issue #78 — 3P/4P per-quadrant HUD text pinning. The quad section (L_800517A8) draws
# each player's RANK (x=0x20/0x110), speed readout (x=0x14-0x46 / 0xEB-0x11D), lap-notify
# glyph (x=0x19/0x118) and the inline per-player tag texrects in the outer columns, plus
# quadrant-centred message glyphs (x=0x50/0xF0) and the 3P map panel (centred 240,180).
# Control flow merges at branch labels and hook text at a label runs on every incoming
# path, so instead of per-element scissor pin/reset pairs (unbalanceable across the
# 4P-only branches) one full-width scissor spans the section (begin at 0x800517D0, popped
# flag-guarded at the shared exit L_80052C00) and the hooks in between only switch the
# sticky rect-align state: LEFT for the left column, RIGHT for the right, 25%/75%
# fractional origins for quadrant-centred elements, NONE for centre-anchored ones (LAP
# row at x=0x60/0xB4 and the 4P map overlay at screen centre are correct untagged).
# Natives in src/lambo_hud_widescreen.c; no-op at 4:3. See docs/HUD.md.

# RANK corners: Q1 left, Q2 right, Q3 left, Q4 (4P-only body) right; NONE at the merge
# label 0x80051898 before the untagged static DL 0x80166FF0.
[[patches.hook]]
func = "func_80050860"
before_vram = 0x800517D0
text = "lambo_ws_quad_text_begin(rdram);"

[[patches.hook]]
func = "func_80050860"
before_vram = 0x80051804
text = "lambo_ws_quad_right(rdram);"

[[patches.hook]]
func = "func_80050860"
before_vram = 0x80051838
text = "lambo_ws_quad_left(rdram);"

[[patches.hook]]
func = "func_80050860"
before_vram = 0x80051880
text = "lambo_ws_quad_right(rdram);"

[[patches.hook]]
func = "func_80050860"
before_vram = 0x80051898
text = "lambo_ws_quad_none(rdram);"

